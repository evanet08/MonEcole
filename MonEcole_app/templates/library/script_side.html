<!-- =====edit emprunt -->
<script>
    $(document).ready(function() {
    function loadAnnees(callback) {
        $.ajax({
            url: '/library/api/get_annees/',
            method: 'GET',
            success: function(response) {
                callback(response.annees || []);
            },
            error: function(xhr) {
                console.error('Erreur lors du chargement des années:', xhr.responseText);
                callback([]);
            }
        });
    }

    function loadCampus(callback) {
        $.ajax({
            url: '/library/api/campus-options/',
            method: 'GET',
            success: function(response) {
                callback(response.campus || []);
            },
            error: function(xhr) {
                console.error('Erreur lors du chargement des campus:', xhr.responseText);
                callback([]);
            }
        });
    }

    function loadCycles(idAnnee, idCampus, callback) {
        if (!idAnnee || !idCampus) {
            callback([]);
            return;
        }
        $.ajax({
            url: '/api/cycle-options/',
            method: 'GET',
            data: { id_annee: idAnnee, id_campus: idCampus },
            success: function(response) {
                callback(response.cycles || []);
            },
            error: function(xhr) {
                console.error('Erreur lors du chargement des cycles:', xhr.responseText);
                callback([]);
            }
        });
    }

    function loadClasses(idAnnee, idCampus, idCycle, callback) {
            if (!idAnnee || !idCampus || !idCycle) {
                callback([]);
                return;
            }
            $.ajax({
                url: '/api/classe-options/',
                method: 'GET',
                data: { id_annee: idAnnee, id_campus: idCampus, id_cycle: idCycle },
                success: function(response) {
                    const classes = (response.classes || []).map(function(cls) {
                        return {
                            id_classe_active: cls["id_classe_active"],
                            classe: cls["classe_id__classe"],   
                            groupe: cls["groupe"] || ""       
                        };
                    });

                    console.log("Classes après map:", classes);
                    callback(classes);
                },
                error: function(xhr) {
                    console.error('Erreur lors du chargement des classes:', xhr.responseText);
                    callback([]);
                }
            });


        }


    function loadEleves(idAnnee, idCampus, idCycle, idClasse, callback) {
        if (!idAnnee || !idCampus || !idCycle || !idClasse) {
            callback([]);
            return;
        }
        $.ajax({
            url: '/get_pupils_registred_classe/',
            method: 'GET',
            data: {
                id_annee: idAnnee,
                id_campus: idCampus,
                id_cycle: idCycle,
                id_classe_active: idClasse
            },
            success: function(response) {
                callback(response.data || []);
            },
            error: function(xhr) {
                console.error('Erreur lors du chargement des élèves:', xhr.responseText);
                callback([]);
            }
        });
    }

    function loadLivres(callback) {
        $.ajax({
            url: '/library/api/livres/',
            method: 'GET',
            success: function(response) {
                callback(response.livres || []);
            },
            error: function(xhr) {
                console.error('Erreur lors du chargement des livres:', xhr.responseText);
                callback([]);
            }
        });
    }

    $('.emprunt-validate-btn').click(function(e) {
        e.preventDefault();
        const id = $(this).data('id');
        const anneeCell = $(`#emprunt-annee-${id}`);
        const campusCell = $(`#emprunt-campus-${id}`);
        const cycleCell = $(`#emprunt-cycle-${id}`);
        const classeCell = $(`#emprunt-classe-${id}`);
        const eleveCell = $(`#emprunt-eleve-${id}`);
        const livreCell = $(`#emprunt-livre-${id}`);
        const dateEmpruntCell = $(`#emprunt-date-emprunt-${id}`);
        const dateRetourCell = $(`#emprunt-date-retour-${id}`);
        const originalAnnee = anneeCell.text().trim();
        const originalCampus = campusCell.text().trim();
        const originalCycle = cycleCell.text().trim();
        const originalClasse = classeCell.text().trim();
        const originalEleve = eleveCell.text().trim();
        const originalLivre = livreCell.text().trim();
        const originalDateEmprunt = dateEmpruntCell.text().trim();
        const originalDateRetour = dateRetourCell.text().trim();

        loadAnnees(function(annees) {
            let anneeOptions = '<select class="form-control edit-annee">';
            annees.forEach(function(annee) {
                anneeOptions += `<option value="${annee.id_annee}" ${annee.annee === originalAnnee ? 'selected' : ''}>${annee.annee}</option>`;
            });
            anneeOptions += '</select>';

            loadCampus(function(campus) {
                let campusOptions = '<select class="form-control edit-campus">';
                campus.forEach(function(c) {
                    campusOptions += `<option value="${c.id_campus}" ${c.campus === originalCampus ? 'selected' : ''}>${c.campus}</option>`;
                });
                campusOptions += '</select>';

                const selectedAnneeId = annees.find(a => a.annee === originalAnnee)?.id_annee;
                const selectedCampusId = campus.find(c => c.campus === originalCampus)?.id_campus;
                loadCycles(selectedAnneeId, selectedCampusId, function(cycles) {
                    let cycleOptions = '<select class="form-control edit-cycle">';
                    cycles.forEach(function(cycle) {
                        cycleOptions += `<option value="${cycle.id_cycle_actif}" ${cycle.cycle_id__cycle === originalCycle ? 'selected' : ''}>${cycle.cycle_id__cycle}</option>`;
                    });
                    cycleOptions += '</select>';

                    const selectedCycleId = cycles.find(c => c.cycle_id__cycle === originalCycle)?.id_cycle_actif;
                    loadClasses(selectedAnneeId, selectedCampusId, selectedCycleId, function(classes) {
                        let classeOptions = '<select class="form-control edit-classe">';
                        classes.forEach(function(classe) {
                            let label = classe.classe;
                            if (classe.groupe) {
                                label += " " + classe.groupe;
                            }
                            classeOptions += `<option value="${classe.id_classe_active}" ${classe.classe === originalClasse ? 'selected' : ''}>${label}</option>`;
                        });
                        classeOptions += '</select>';


                        const selectedClasseId = classes.find(c => c.classe_id__classe === originalClasse)?.id_classe_active;
                        loadEleves(selectedAnneeId, selectedCampusId, selectedCycleId, selectedClasseId, function(eleves) {
                            let eleveOptions = '<select class="form-control edit-eleve">';
                            eleves.forEach(function(eleve) {
                                const eleveLabel = eleve.nom_complet;
                                eleveOptions += `<option value="${eleve.id_eleve}" ${eleveLabel === originalEleve ? 'selected' : ''}>${eleveLabel}</option>`;
                            });
                            eleveOptions += '</select>';

                            loadLivres(function(livres) {
                                let livreOptions = '<select class="form-control edit-livre">';
                                livres.forEach(function(livre) {
                                    livreOptions += `<option value="${livre.id}" ${livre.titre === originalLivre ? 'selected' : ''}>${livre.titre}</option>`;
                                });
                                livreOptions += '</select>';

                                anneeCell.html(anneeOptions);
                                campusCell.html(campusOptions);
                                cycleCell.html(cycleOptions);
                                classeCell.html(classeOptions);
                                eleveCell.html(eleveOptions);
                                livreCell.html(livreOptions);
                                dateEmpruntCell.html(`<input type="date" class="form-control edit-date-emprunt" value="${originalDateEmprunt}">`);
                                dateRetourCell.html(`<input type="date" class="form-control edit-date-retour" value="${originalDateRetour}">`);

                                $(`.emprunt-validate-btn[data-id="${id}"]`).hide();
                                $(`#edit-actions-emprunt-${id}`).show();

                                function updateCycles() {
                                    const newAnneeId = $(`.edit-annee`, anneeCell).val();
                                    const newCampusId = $(`.edit-campus`, campusCell).val();
                                    loadCycles(newAnneeId, newCampusId, function(newCycles) {
                                        let newCycleOptions = '<select class="form-control edit-cycle">';
                                        newCycles.forEach(function(cycle) {
                                            newCycleOptions += `<option value="${cycle.id_cycle_actif}">${cycle.cycle_id__cycle}</option>`;
                                        });
                                        newCycleOptions += '</select>';
                                        cycleCell.html(newCycleOptions);
                                        classeCell.html('<select class="form-control edit-classe"></select>');
                                        eleveCell.html('<select class="form-control edit-eleve"></select>');
                                        updateClasses();
                                    });
                                }

                                function updateClasses() {
                                    const newAnneeId = $(`.edit-annee`, anneeCell).val();
                                    const newCampusId = $(`.edit-campus`, campusCell).val();
                                    const newCycleId = $(`.edit-cycle`, cycleCell).val();

                                    loadClasses(newAnneeId, newCampusId, newCycleId, function(newClasses) {
                                        let newClasseOptions = '<select class="form-control edit-classe">';
                                        newClasses.forEach(function(classe) {
                                            let label = classe.classe;
                                            if (classe.groupe) {
                                                label += " " + classe.groupe;
                                            }
                                            newClasseOptions += `<option value="${classe.id_classe_active}">${label}</option>`;
                                        });
                                        newClasseOptions += '</select>';
                                        
                                        classeCell.html(newClasseOptions);
                                        eleveCell.html('<select class="form-control edit-eleve"></select>');
                                        updateEleves();
                                    });
                                }

                                function updateEleves() {
                                    const newAnneeId = $(`.edit-annee`, anneeCell).val();
                                    const newCampusId = $(`.edit-campus`, campusCell).val();
                                    const newCycleId = $(`.edit-cycle`, cycleCell).val();
                                    const newClasseId = $(`.edit-classe`, classeCell).val();
                                    loadEleves(newAnneeId, newCampusId, newCycleId, newClasseId, function(newEleves) {
                                        let newEleveOptions = '<select class="form-control edit-eleve">';
                                        newEleves.forEach(function(eleve) {
                                            newEleveOptions += `<option value="${eleve.id_eleve}">${eleve.nom_complet}</option>`;
                                        });
                                        newEleveOptions += '</select>';
                                        eleveCell.html(newEleveOptions);
                                    });
                                }

                                $(`.edit-annee`, anneeCell).change(updateCycles);
                                $(`.edit-campus`, campusCell).change(updateCycles);
                                $(`.edit-cycle`, cycleCell).change(updateClasses);
                                $(`.edit-classe`, classeCell).change(updateEleves);
                            });
                        });
                    });
                });
            });
        });
    });

    $('.emprunt-cancel-btn').click(function() {
        const id = $(this).data('id');
        const anneeCell = $(`#emprunt-annee-${id}`);
        const campusCell = $(`#emprunt-campus-${id}`);
        const cycleCell = $(`#emprunt-cycle-${id}`);
        const classeCell = $(`#emprunt-classe-${id}`);
        const eleveCell = $(`#emprunt-eleve-${id}`);
        const livreCell = $(`#emprunt-livre-${id}`);
        const dateEmpruntCell = $(`#emprunt-date-emprunt-${id}`);
        const dateRetourCell = $(`#emprunt-date-retour-${id}`);
        const originalAnnee = anneeCell.find('.edit-annee option:selected').text();
        const originalCampus = campusCell.find('.edit-campus option:selected').text();
        const originalCycle = cycleCell.find('.edit-cycle option:selected').text();
        const originalClasse = classeCell.find('.edit-classe option:selected').text();
        const originalEleve = eleveCell.find('.edit-eleve option:selected').text();
        const originalLivre = livreCell.find('.edit-livre option:selected').text();
        const originalDateEmprunt = dateEmpruntCell.find('.edit-date-emprunt').val();
        const originalDateRetour = dateRetourCell.find('.edit-date-retour').val();

        anneeCell.html(originalAnnee);
        campusCell.html(originalCampus);
        cycleCell.html(originalCycle);
        classeCell.html(originalClasse);
        eleveCell.html(originalEleve);
        livreCell.html(originalLivre);
        dateEmpruntCell.html(originalDateEmprunt);
        dateRetourCell.html(originalDateRetour);
        $(`#edit-actions-emprunt-${id}`).hide();
        $(`.emprunt-validate-btn[data-id="${id}"]`).show();
    });

    $('.emprunt-save-btn').click(function() {
        const id = $(this).data('id');
        const anneeCell = $(`#emprunt-annee-${id}`);
        const campusCell = $(`#emprunt-campus-${id}`);
        const cycleCell = $(`#emprunt-cycle-${id}`);
        const classeCell = $(`#emprunt-classe-${id}`);
        const eleveCell = $(`#emprunt-eleve-${id}`);
        const livreCell = $(`#emprunt-livre-${id}`);
        const dateEmpruntCell = $(`#emprunt-date-emprunt-${id}`);
        const dateRetourCell = $(`#emprunt-date-retour-${id}`);
        const newAnneeId = anneeCell.find('.edit-annee').val();
        const newCampusId = campusCell.find('.edit-campus').val();
        const newCycleId = cycleCell.find('.edit-cycle').val();
        const newClasseId = classeCell.find('.edit-classe').val();
        const newEleveId = eleveCell.find('.edit-eleve').val();
        const newLivreId = livreCell.find('.edit-livre').val();
        const newDateEmprunt = dateEmpruntCell.find('.edit-date-emprunt').val();
        const newDateRetour = dateRetourCell.find('.edit-date-retour').val();

        $.ajax({
            url: `/library/api/emprunt/${id}/update/`,
            method: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                id_annee: newAnneeId,
                id_campus: newCampusId,
                id_cycle_actif: newCycleId,
                id_classe_active: newClasseId,
                id_eleve: newEleveId,
                id_livre: newLivreId,
                date_emprunt: newDateEmprunt,
                date_retour_prevue: newDateRetour
            }),
            headers: {
                'X-CSRFToken': $('[name=csrfmiddlewaretoken]').val()
            },
            success: function(response) {
                if (response.success) {
                    alert('Modification réusssie avec succès')
                    anneeCell.html(anneeCell.find('.edit-annee option:selected').text());
                    campusCell.html(campusCell.find('.edit-campus option:selected').text());
                    cycleCell.html(cycleCell.find('.edit-cycle option:selected').text());
                    classeCell.html(classeCell.find('.edit-classe option:selected').text());
                    eleveCell.html(eleveCell.find('.edit-eleve option:selected').text());
                    livreCell.html(livreCell.find('.edit-livre option:selected').text());
                    dateEmpruntCell.html(newDateEmprunt);
                    dateRetourCell.html(newDateRetour);
                    $(`#edit-actions-emprunt-${id}`).hide();
                    $(`.emprunt-validate-btn[data-id="${id}"]`).show();
                } else {
                    alert(response.error || 'Erreur lors de la sauvegarde.');
                }
            },
            error: function(xhr) {
                console.log('Erreur AJAX :', xhr.responseText);
                const errorMsg = xhr.responseJSON?.error || 'Une erreur s\'est produite.';
                alert(errorMsg);
            }
        });
    });
});
</script>

<!-- save empurnt -->
<script>
    $(document).ready(function () {
    let selectedAnneeId = null;
    let selectedCampusId = null;
    let selectedCycleId = null;
    let selectedClasseId = null;
    let selectedEleveId = null;
    let selectedBookId = null;

    function getCsrfToken() {
        const token = $('input[name=csrfmiddlewaretoken]').val();
        if (!token) console.error('Token CSRF manquant');
        return token;
    }

    function fetchCategoriesAndBooks(armoireId) {
        const $container = $('#documents-container');
        if (!armoireId) {
            $container.html('<p class="no-selection">Veuillez sélectionner une armoire pour afficher les catégories.</p>');
            return;
        }

        $.ajax({
            url: `/library/api/categories-and-books/?armoire_id=${armoireId}`,
            type: 'GET',
            headers: { 'X-CSRFToken': getCsrfToken() },
            success: function (data) {
                if (!data) {
                    $container.html('<p class="error-message">Réponse vide du serveur.</p>');
                    return;
                }
                if (data.error) {
                    $container.html(`<p class="error-message">${data.error}</p>`);
                    renderFolders([]);
                    return;
                }
                renderFolders(data.categories || []);
            },
            error: function (xhr) {
                console.error('Erreur AJAX (categories):', xhr.responseText);
                $container.html('<p class="error-message">Une erreur est survenue lors du chargement des données.</p>');
            }
        });
    }

    function renderFolders(folders) {
        const $container = $('#documents-container');
        $container.empty();

        folders.forEach(folder => {
            const $folderElement = $(`
                <div class="folder-item" data-folder-id="${folder.id}">
                    <div class="folder-icon"><i class="fas fa-folder"></i></div>
                    <div class="folder-name">${folder.name}</div>
                </div>
            `);
            $folderElement.on('click', () => openFolder(folder));
            $container.append($folderElement);
        });
    }

    function openFolder(folder) {
        const $modal = $('#folder-modal');
        const $modalTitle = $('#modal-title');
        const $booksContainer = $('#books-container');

        $modalTitle.text(folder.name);
        $booksContainer.empty();

        folder.books.forEach(book => {
            const iconClass = {
                'pdf': 'fa-file-pdf',
                'doc': 'fa-file-word',
                'xls': 'fa-file-excel'
            }[book.type] || 'fa-file';

            const $bookElement = $(`
                <div class="book-item" data-book-id="${book.id}">
                    <div class="book-icon"><i class="fas ${iconClass}"></i></div>
                    <div class="book-title">${book.title}</div>
                    <div class="book-author">${book.author}</div>
                </div>
            `);
            $bookElement.on('click', () => openBookModal(book));
            $booksContainer.append($bookElement);
        });

        $modal.show();
    }

    function openBookModal(book) {
        const $modal = $('#book-modal');
        selectedBookId = book.id;
        $('#selected-book-id').text(book.id); 

        $('#annee').val('');
        $('#classe-container').hide();
        $('#eleve-container').hide();
        $('#date_retour_prevue').val('');

        selectedAnneeId = null;
        selectedCampusId = null;
        selectedCycleId = null;
        selectedClasseId = null;
        selectedEleveId = null;

        $modal.show();
    }

    $('#annee').on('change', function () {
        selectedAnneeId = $(this).val();
        if (!selectedAnneeId) {
            $('#classe-container').hide();
            $('#eleve-container').hide();
            selectedCampusId = null;
            selectedCycleId = null;
            selectedClasseId = null;
            selectedEleveId = null;
            return;
        }

        $.ajax({
            url: '/store_annee_session/',
            type: 'POST',
            data: {
                'id_annee': selectedAnneeId,
                'csrfmiddlewaretoken': getCsrfToken()
            },
            success: function (response) {
                if (!response) {
                    alert('Erreur : Réponse vide du serveur.');
                    return;
                }
                if (response.success) {
                    updateClasseDropdown(selectedAnneeId);
                } else {
                    alert('Erreur : ' + (response.error || 'Erreur inconnue lors de l\'enregistrement de l\'année.'));
                }
            },
            error: function (xhr) {
                console.error('Erreur AJAX (store_annee_session):', xhr.responseText);
                alert('Une erreur est survenue lors de l\'enregistrement de l\'année.');
            }
        });
    });

    function updateClasseDropdown(anneeId) {
        const $dropdown = $('#id_classe_active');
        $.ajax({
            url: `/get_classes_actives/${anneeId}/`,
            type: 'GET',
            success: function (response) {
                if (!response) {
                    alert('Erreur : Réponse vide du serveur.');
                    return;
                }
                if (!response.success && response.error) {
                    alert('Erreur : ' + response.error);
                    return;
                }
                const data = response.classes || [];
                $dropdown.empty().append('<option value="">------</option>');
                if (data.length > 0) {
                    data.forEach(item => {
                        const $option = $(`<option value="${item.id_classe_active}">
                            ${item.campus_nom} - ${item.cycle_nom} - ${item.classe_nom}${item.groupe ? ' (' + item.groupe + ')' : ''}
                        </option>`);
                        $option.data('campusId', item.id_campus);
                        $option.data('cycleId', item.id_cycle);
                        $dropdown.append($option);
                    });
                    $('#classe-container').show();
                } else {
                    alert(response.message || 'Aucune classe active trouvée pour cette année scolaire.');
                    $('#classe-container').hide();
                }
                $('#eleve-container').hide();
            },
            error: function (xhr) {
                console.error('Erreur AJAX (get_classes_actives):', xhr.responseText);
                alert('Erreur lors du chargement des classes.');
            }
        });
    }

    $('#id_classe_active').on('change', function () {
        selectedClasseId = $(this).val();
        if (selectedClasseId) {
            const $selectedOption = $(this).find('option:selected');
            selectedCampusId = $selectedOption.data('campusId');
            selectedCycleId = $selectedOption.data('cycleId');
            updateEleveDropdown();
        } else {
            $('#eleve-container').hide();
            selectedCampusId = null;
            selectedCycleId = null;
            selectedEleveId = null;
        }
    });

    function updateEleveDropdown() {
        const $dropdown = $('#id_id_eleve');
        const pupilsUrl = `/get_pupils_registred_classe/?id_annee=${selectedAnneeId}&id_campus=${selectedCampusId}&id_cycle=${selectedCycleId}&id_classe_active=${selectedClasseId}`;

        $.ajax({
            url: pupilsUrl,
            type: 'GET',
            success: function (response) {
                if (!response) {
                    alert('Erreur : Réponse vide du serveur.');
                    return;
                }
                if (!response.success) {
                    alert(response.error || 'Erreur lors du chargement des élèves.');
                    $dropdown.hide();
                    return;
                }
                const data = response.data || [];
                $dropdown.empty().append('<option value="">------</option>');
                if (data.length > 0) {
                    data.forEach(item => {
                        $dropdown.append(`<option value="${item.id_eleve}">${item.nom_complet}</option>`);
                    });
                    $('#eleve-container').show();
                } else {
                    alert('Aucun élève trouvé pour cette classe.');
                    $('#eleve-container').hide();
                }
            },
            error: function (xhr) {
                console.error('Erreur AJAX (get_pupils_registred_classe):', xhr.responseText);
                alert('Erreur lors du chargement des élèves.');
            }
        });
    }

    $('#id_id_eleve').on('change', function () {
        selectedEleveId = $(this).val();
    });

    $('#save-book-form').on('click', function () {
        const dateRetourPrevue = $('#date_retour_prevue').val();

        if (!selectedBookId || !selectedAnneeId || !selectedClasseId || !selectedEleveId || !dateRetourPrevue) {
            alert('Veuillez remplir tous les champs (année, classe, élève, date de retour).');
            return;
        }

        const formData = {
            id_livre: selectedBookId,
            id_annee: selectedAnneeId,
            id_campus: selectedCampusId,
            id_cycle_actif: selectedCycleId,
            id_classe_active: selectedClasseId,
            id_eleve: selectedEleveId,
            date_retour_prevue: dateRetourPrevue
        };

        $.ajax({
            url: '/library/api/save-emprunt/',
            type: 'POST',
            headers: { 'X-CSRFToken': getCsrfToken() },
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function (response) {
                if (!response) {
                    alert('Erreur : Réponse vide du serveur.');
                    return;
                }
                if (response.success) {
                    alert('Emprunt enregistré avec succès !');
                    window.location.href = "/library/ajout_emprunt/";

                    $('#book-modal').hide();
                } else {
                    alert('Erreur : ' + (response.error || 'Erreur inconnue lors de l\'enregistrement.'));
                }
            },
            error: function (xhr) {
                console.error('Erreur AJAX (save_emprunt):', xhr.responseText);
                alert('Une erreur est survenue lors de l\'enregistrement de l\'emprunt.');
            }
        });
    });

    $('#close-book-modal, #cancel-book-form').on('click', function () {
        $('#book-modal').hide();
    });

    $('#folder-modal .close').on('click', function () {
        $('#folder-modal').hide();
    });

    $(window).on('click', function (event) {
        if (event.target.id === 'book-modal') {
            $('#book-modal').hide();
        }
        if (event.target.id === 'folder-modal') {
            $('#folder-modal').hide();
        }
    });

    $('#search-input').on('input', function () {
        const searchTerm = $(this).val().toLowerCase();
        const armoireId = $('#armoire_id').val();

        $.ajax({
            url: `/library/api/categories-and-books/?armoire_id=${armoireId}`,
            type: 'GET',
            success: function (data) {
                if (!data) return;
                const filteredFolders = (data.categories || []).filter(folder =>
                    folder.name.toLowerCase().includes(searchTerm)
                );
                renderFolders(filteredFolders);
            }
        });
    });

    const initialArmoireId = $('#armoire_id').val() || '';
    fetchCategoriesAndBooks(initialArmoireId);

    $('#armoire_id').on('change', function () {
        fetchCategoriesAndBooks($(this).val());
    });
});

<script>
    $(document).on("change", ".update_rendu_livre", function() {
    const checkbox = $(this);
    const empruntId = checkbox.data("id");

    if (checkbox.is(":checked")) {
        // Stocker l'ID de l'emprunt dans le champ caché du modal
            $("#empruntId").val(empruntId);
            
            // Ouvrir le modal
            $("#dateRetourModal").modal("show");

            // Lorsqu'on clique sur "Confirmer"
            $("#confirmDateRetour").off("click").on("click", function() {
                const dateRetour = $("#dateRetour").val();
                
                if (!dateRetour) {
                    alert("Veuillez sélectionner une date.");
                    return;
                }

                $.ajax({
                    url: "/library/update-rendu/",
                    method: "POST",
                    data: {
                        id: empruntId,
                        date_retour_effective: dateRetour,
                        csrfmiddlewaretoken: $("input[name=csrfmiddlewaretoken]").val()
                    },
                    success: function(response) {
                        if (response.success) {
                            alert("Retour enregistré avec succès !");
                            $("#dateRetourModal").modal("hide"); // Fermer le modal
                            window.location.href = "/library/list_emprunt_retour/";
                        } else {
                            alert("Erreur : " + response.error);
                        }
                    },
                    error: function(xhr) {
                        console.error("Erreur AJAX:", xhr.responseText);
                        alert("Une erreur est survenue lors de l'enregistrement.");
                    }
                });
            });

            // Si l'utilisateur annule, décocher la checkbox
            $("#dateRetourModal").on("hidden.bs.modal", function() {
                if (!$("#dateRetour").val()) {
                    checkbox.prop("checked", false);
                }
            });
        }
    });
</script>
<!-- ===============Limiter la date -->

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Obtenir la date actuelle au format YYYY-MM-DD
        const today = new Date().toISOString().split('T')[0];

        // Définir la date maximale pour start_date et end_date
        document.getElementById('start_date').setAttribute('max', today);
        document.getElementById('end_date').setAttribute('max', today);

        // Optionnel : S'assurer que end_date n'est pas antérieur à start_date
        document.getElementById('start_date').addEventListener('change', function() {
            const startDate = this.value;
            const endDateInput = document.getElementById('end_date');
            endDateInput.setAttribute('min', startDate);
        });

        // Optionnel : Réinitialiser min de end_date si start_date est effacé
        document.getElementById('start_date').addEventListener('input', function() {
            if (!this.value) {
                document.getElementById('end_date').removeAttribute('min');
            }
        });
    });
</script>
