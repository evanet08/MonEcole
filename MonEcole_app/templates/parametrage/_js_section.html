<!-- ====categories scripts -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelectorAll(".edit-btn-categorie").forEach(button => {
            button.addEventListener("click", function (event) {
                event.preventDefault();
                const idCategorie = this.getAttribute("data-id");
                if (!idCategorie || isNaN(idCategorie)) {
                    alert("Erreur : ID de catégorie invalide.");
                    return;
                }
                editCategorie(idCategorie);
            });
        });

        function editCategorie(idCategorie) {
            const row = document.getElementById(`row-categorie-${idCategorie}`);
            const categorieName = document.getElementById(`categorie-name-${idCategorie}`).textContent.trim();
            const sigle = document.getElementById(`categorie-sigle-${idCategorie}`).textContent.trim();

            row.innerHTML = `
                <td>
                    <input type="text" class="form-control" id="edit-categorie-${idCategorie}" value="${categorieName}">
                </td>
                <td>
                    <input type="text" class="form-control" id="edit-sigle-${idCategorie}" value="${sigle}">
                </td>
                <td>
                    <button class="btn btn-sm btn-success me-2" id="save-btn-${idCategorie}">
                        <i class="fas fa-check"></i> 
                    </button>
                    <button class="btn btn-sm btn-danger" id="cancel-btn-${idCategorie}">
                        <i class="fas fa-times"></i> 
                    </button>
                </td>
            `;

            document.getElementById(`save-btn-${idCategorie}`).addEventListener("click", () => updateCategorie(idCategorie));
            document.getElementById(`cancel-btn-${idCategorie}`).addEventListener("click", () => cancelEditCategorie(idCategorie, categorieName, sigle));
        }

        function cancelEditCategorie(idCategorie, categorieName, sigle) {
            const row = document.getElementById(`row-categorie-${idCategorie}`);
            row.innerHTML = `
                <td id="categorie-name-${idCategorie}">${categorieName}</td>
                <td id="categorie-sigle-${idCategorie}">${sigle}</td>
                <td>
                    <a href="#" class="btn btn-sm btn-outline-primary edit-btn-categorie" data-id="${idCategorie}">
                        <i class="fas fa-edit"></i> Éditer
                    </a>
                </td>
            `;
            window.location.reload();
        }

        function updateCategorie(idCategorie) {
            const categorie = document.getElementById(`edit-categorie-${idCategorie}`).value;
            const sigle = document.getElementById(`edit-sigle-${idCategorie}`).value;

            if (!categorie) {
                alert("Le champ catégorie est requis.");
                return;
            }

            fetch(`/update_personnel_categorie/${idCategorie}/`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": getCSRFToken()
                },
                body: JSON.stringify({
                    categorie: categorie,
                    sigle: sigle || null
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        window.location.reload();
                    } else {
                        alert("Erreur : " + data.error);
                    }
                })
                .catch(error => {
                    alert("Erreur lors de la mise à jour de la catégorie.");
                });
        }

        function getCSRFToken() {
            const token = document.querySelector('[name=csrfmiddlewaretoken]');
            return token ? token.value : '';
        }
    });
</script>

<!-- ============ creation dynamique des trimestres/classes -->
<script>
    if (window.location.pathname.includes("/create_trimestre_annee/")) {
        document.addEventListener("DOMContentLoaded", function () {
            const idAnnee = document.getElementById("id_id_annee");
            const idCampus = document.getElementById("id_id_campus");
            const idClasseCycle = document.getElementById("id_id_cycle");
            const idClasse = document.getElementById("id_id_classe");
            const trimestreSelect = document.getElementById("id_trimestre");
            const trimestreTable = document.getElementById("trimestre-table");
            const tbody = document.querySelector("#tbody-trimestres");
            const addTrimestreForm = document.getElementById("addTrimestreForm");
            const dateDebutInput = document.getElementById("new-date_debut");
            const dateFinInput = document.getElementById("new-date_fin");
            let modal = document.getElementById("modalContainer");

            // Vérifier si les éléments existent


            function saveToSession(key, value) {
                sessionStorage.setItem(key, value);
            }

            function hideFields(...fields) {
                fields.forEach(field => {
                    if (field) {
                        console.log(`Masquage de ${field.id}`);
                        field.parentElement.style.display = "none";
                        field.disabled = true;
                    }
                });
            }

            function showField(field) {
                if (field) {
                    console.log(`Affichage de ${field.id}`);
                    field.parentElement.style.display = "block";
                    field.style.display = "block";
                    field.disabled = false;
                }
            }

            function showError(message, isSuccess = false) {
                // console.log(message);
                const errorDiv = document.createElement("div");
                errorDiv.className = isSuccess ? "alert alert-success" : "alert alert-danger";
                errorDiv.textContent = message;
                trimestreTable.parentElement.insertBefore(errorDiv, trimestreTable);
                setTimeout(() => errorDiv.remove(), 5000);
            }

            // Masquer les champs au chargement
            hideFields(idClasseCycle, idClasse, trimestreSelect);
            trimestreTable.style.display = "none";

            function updateDropdown(url, dropdown, idKey, nameKey) {
                //console.log(`Appel de ${url} pour remplir ${dropdown.id}`);
                fetch(url)
                    .then(response => {
                        if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                        return response.json();
                    })
                    .then(data => {
                        // console.log("Données reçues :", data);
                        const items = data.data || data;
                        dropdown.innerHTML = '<option value="">-------</option>';
                        if (items.length > 0) {
                            items.forEach(item => {
                                let option = document.createElement("option");
                                option.value = item[idKey];
                                option.textContent = item[nameKey];
                                dropdown.appendChild(option);
                            });
                            showField(dropdown);
                        } else {
                            dropdown.innerHTML = '<option value="">Aucun trimestre disponible</option>';
                            showField(dropdown);
                        }
                    })
                    .catch(error => {
                        showError("Erreur lors du chargement des données. Veuillez réessayer.");
                    });
            }

            if (idCampus) {
                idCampus.addEventListener("change", function () {
                    hideFields(idAnnee, idClasseCycle, idClasse, trimestreSelect);
                    if (this.value) {
                        saveToSession("id_campus", this.value);
                        showField(idAnnee);
                    }
                });
            }

            idAnnee.addEventListener("change", function () {
                hideFields(idClasseCycle, idClasse, trimestreSelect);
                trimestreTable.style.display = "none";
                const campusId = idCampus?.value || sessionStorage.getItem("id_campus") || "";

                if (this.value) {
                    saveToSession("id_annee", this.value);
                    let url = `/get_cycles_parAnnee/?id_annee=${this.value}&id_campus=${campusId}`;
                    updateDropdown(url, idClasseCycle, 'id_cycle_actif', 'cycle');
                }
            });

            idClasseCycle.addEventListener("change", function () {
                hideFields(idClasse, trimestreSelect);
                trimestreTable.style.display = "none";
                const anneeId = idAnnee.value;
                const campusId = idCampus?.value || sessionStorage.getItem("id_campus") || "";

                if (this.value && anneeId && campusId) {
                    saveToSession("id_classe_cycle", this.value);
                    let url = `/get_classes/?id_annee=${anneeId}&id_campus=${campusId}&id_classe_cycle=${this.value}`;
                    updateDropdown(url, idClasse, 'id_classe', 'classe');
                }
            });

            idClasse.addEventListener("change", function () {
                const anneeId = idAnnee.value;
                const cycleId = idClasseCycle.value;
                const campusId = idCampus?.value || sessionStorage.getItem("id_campus") || "";

                if (this.value && anneeId && campusId && cycleId) {
                    modal.style.display = "none";
                    saveToSession("id_classe", this.value);

                    // Remplir le sélecteur id_trimestre
                    updateDropdown('/get_trimestres/', trimestreSelect, 'id', 'label');

                    // Remplir le tableau avec les trimestres enregistrés
                    fetch(`/get_trimestres_table/?id_annee=${anneeId}&id_campus=${campusId}&id_cycle=${cycleId}&id_classe=${this.value}`)
                        .then(response => {
                            if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                            return response.json();
                        })
                        .then(data => {
                            tbody.innerHTML = "";
                            if (data.length > 0) {
                                trimestreTable.style.display = "block";
                                data.forEach(trimestre => {
                                    let row = `
                                    <tr>
                                        <td class="fw-bold text-primary" style="font-size: 18px;">
                                            ${trimestre.trimestre__trimestre}
                                        </td>
                                        <td>${trimestre.debut || ''}</td>
                                        <td>${trimestre.fin || ''}</td>
                                        <td>${trimestre.isOpen ? 'Ouvert' : 'Clôturé'}</td>
                                        <td>
                                            <a href="javascript:void(0);" class="btn btn-sm btn-outline-primary me-2 edit-btn-trimestre" 
                                            data-id="${trimestre.id_trimestre}" onclick="editTrimestre(event)">
                                                <i class="fas fa-edit"></i>
                                            </a>
                                        </td>
                                    </tr>`;
                                    tbody.innerHTML += row;
                                });
                            } else {
                                trimestreTable.style.display = "block";
                                tbody.innerHTML = `<tr><td colspan="5">Aucun trimestre trouvé</td></tr>`;
                            }
                        })
                        .catch(error => {
                            showError("Erreur lors du chargement des trimestres. Veuillez réessayer.");
                        });
                }
            });

            // Gestionnaire de soumission du formulaire
            if (addTrimestreForm) {
                addTrimestreForm.addEventListener("submit", function (event) {
                    event.preventDefault();

                    const trimestreId = trimestreSelect.value;
                    const anneeId = idAnnee.value;
                    const campusId = idCampus.value;
                    const cycleId = idClasseCycle.value;
                    const classeId = idClasse.value;
                    const dateDebut = dateDebutInput.value;
                    const dateFin = dateFinInput.value;

                    if (!trimestreId || !anneeId || !campusId || !cycleId || !classeId) {
                        showError("Veuillez remplir tous les champs requis.");
                        return;
                    }

                    if ((dateDebut && !dateFin) || (!dateDebut && dateFin)) {
                        showError("Veuillez fournir à la fois la date de début et la date de fin, ou aucune des deux.");
                        return;
                    }

                    const data = {
                        trimestre: trimestreId,
                        id_annee: anneeId,
                        id_campus: campusId,
                        id_cycle: cycleId,
                        id_classe: classeId,
                        debut: dateDebut || null,
                        fin: dateFin || null
                    };

                    fetch('/create_trimestre_annee/', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                        },
                        body: JSON.stringify(data)
                    })
                        .then(response => response.json())
                        .then(data => {

<script>
    if (window.location.pathname.includes("/create_annee_periode/")) {

            const dateFinInput = document.getElementById("new-date_fin");
            let modal = document.getElementById("modalContainer");


            function saveToSession(key, value) {
                sessionStorage.setItem(key, value);
            }

            function hideFields(...fields) {
                fields.forEach(field => {
                    if (field) {
                        field.parentElement.style.display = "none";
                        field.disabled = true;
                    }
                });
            }

            function showField(field) {
                if (field) {
                    field.parentElement.style.display = "block";
                    field.style.display = "block";
                    field.disabled = false;
                }
            }

            function showError(message, isSuccess = false) {
                const errorDiv = document.createElement("div");
                errorDiv.className = isSuccess ? "alert alert-success" : "alert alert-danger";
                errorDiv.textContent = message;
                periodeTable.parentElement.insertBefore(errorDiv, periodeTable);
                setTimeout(() => errorDiv.remove(), 5000);
            }

            hideFields(idClasseCycle, idClasse, periodeSelect, idTrimestreAnnne);

                fetch(url)
                    .then(response => {
                        if (!response.ok) throw new Error(`Erreur HTTP: ${response.status}`);
                        return response.json();
                    })
                    .then(data => {
                        const items = data.data || data;
                        dropdown.innerHTML = '<option value="">-------</option>';
                        if (items.length > 0) {
                            items.forEach(item => {
                                let option = document.createElement("option");
                                option.value = item[idKey];
                                option.textContent = item[nameKey];
                                dropdown.appendChild(option);
                            });
                            showField(dropdown);
                        } else {
                            dropdown.innerHTML = '<option value="">Aucune donnée disponible</option>';
