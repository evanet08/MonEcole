

<style>
   /* Style pour les modals */
    .modal-advance-class {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.5);
        z-index: 1000;
    }

    .modal-advance-class.active {
        display: block;
    }

    .modal-advance-class .modal-content {
        background-color: white;
        margin: 15% auto;
        padding: 20px;
        border-radius: 5px;
        width: 80%;
        max-width: 500px;
        position: relative;
    }

    /* Ajustement pour le second modal */
    #modalAdvanceClass2 {
        z-index: 1001; /* Plus haut que le premier modal */
    }

    #modalAdvanceClass2 .modal-content {
        margin: 10% auto; /* Légèrement décalé pour montrer la superposition */
    }

    .close-advance-class {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
    }

    .close-advance-class:hover {
        color: black;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 5px;
    }

    .form-group select {
        width: 100%;
        padding: 8px;
        border-radius: 4px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 20px;
        background-color: #4CAF50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background-color: #45a049;
    }
</style>
<!-- Premier modal -->


<!-- Premier modal -->
<div id="modalAdvanceClass1" class="modal modal-advance-class">
    <div class="modal-content">
        <span class="close-advance-class">×</span>
        <h2>Sélectionner l'année et la classe</h2>
        <form id="formAdvanceClass1">
            <div class="form-group">
                <label for="modalAnneeAdvance1">Année :</label>
                <select id="modalAnneeAdvance1" name="annee" required></select>
            </div>
            <div class="form-group">
                <label for="modalClasseAdvance1">Classe :</label>
                <select id="modalClasseAdvance1" name="classe" required></select>
            </div>
        </form>
    </div>
</div>

<!-- Deuxième modal -->
<div id="modalAdvanceClass2" class="modal modal-advance-class">
    <div class="modal-content">
        <span class="close-advance-class">×</span>
        <h2>Sélectionner la classe suivante</h2>
        <form id="formAdvanceClass2">
            <div class="form-group">
                <label for="modalAnneeAdvance2">Année :</label>
                <select id="modalAnneeAdvance2" name="annee2" required></select>
            </div>
            <div class="form-group">
                <label for="modalClasseAdvance2">Classe :</label>
                <select id="modalClasseAdvance2" name="classe2" required></select>
            </div>
            <button type="submit">Confirmer</button>
        </form>
    </div>
</div>


<script>
    const getNextYear = (selectedYear) => {
        const [startYear, endYear] = selectedYear.split('-').map(Number);
        return `${startYear + 1}-${endYear + 1}`;
    };

    const updateDropdownAdvanceClass = async (url, dropdown, idKey, nameKey) => {
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Erreur réseau ou serveur : ${response.status}`);
            const responseData = await response.json();
            const data = Array.isArray(responseData) ? responseData : responseData.data || [];

            dropdown.innerHTML = '<option value="">----------</option>';
            if (data.length > 0) {
                data.forEach((item) => {
                    const option = document.createElement("option");
                    option.value = item[idKey];
                    option.textContent = item[nameKey];
                    if (item.id_campus) option.dataset.campus = item.id_campus;
                    if (item.id_cycle) option.dataset.cycle = item.id_cycle;
                    if (item.id) option.dataset.classe = item.id;
                    dropdown.appendChild(option);
                });
                showField(dropdown);
            } else {
                dropdown.innerHTML = '<option value="">----------</option>';
            }
        } catch (error) {
            dropdown.innerHTML = '<option value="">----------</option>';
        }
    };

    document.getElementById('openModal1').addEventListener('click', (e) => {
        e.preventDefault();
        const modal1 = document.getElementById('modalAdvanceClass1');
        modal1.classList.add('active');
        
        updateDropdownAdvanceClass(
            "/get_all_years/", 
            document.getElementById('modalAnneeAdvance1'), 
            "id_annee", 
            "annee"
        );
    });

    document.getElementById('modalAnneeAdvance1').addEventListener('change', async function() {
        const url = `/get_all_classes_repechages_tutilaire/?id_annee=${this.value}`;
        await updateDropdownAdvanceClass(
            url, 
            document.getElementById('modalClasseAdvance1'), 
            "id", 
            "label" 
        );
        sessionStorage.setItem('selectedAnnee1', this.value);
    });
    
    document.getElementById('modalClasseAdvance1').addEventListener('change', async function() {
        if (this.value) {
            const modal2 = document.getElementById('modalAdvanceClass2');
            modal2.classList.add('active');
            
            sessionStorage.setItem('selectedClasse1', this.value);
            const selectedOption = this.options[this.selectedIndex];
            if (selectedOption.dataset.campus) {
                sessionStorage.setItem('selectedCampus1', selectedOption.dataset.campus);
            } else {
                console.warn('Aucun id_campus trouvé pour la classe sélectionnée');
            }
            if (selectedOption.dataset.cycle) {
                sessionStorage.setItem('selectedCycle1', selectedOption.dataset.cycle);
            } else {
                console.warn('Aucun id_cycle trouvé pour la classe sélectionnée');
            }
            if (selectedOption.dataset.classe) {
                sessionStorage.setItem('selectedClasseId1', selectedOption.dataset.classe);
            } else {
                console.warn('Aucun id_classe trouvé pour la classe sélectionnée');
            }

            const modalAnnee1 = document.getElementById('modalAnneeAdvance1');
            if (!modalAnnee1) {
                console.error("L'élément modalAnneeAdvance1 n'est pas trouvé dans le DOM");
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: "Impossible de charger l'année du premier modal. Veuillez vérifier que le modal est correctement chargé.",
                    confirmButtonText: 'OK',
                    timer: 6000
                });
                return;
            }

            const selectedYearText = modalAnnee1.options[modalAnnee1.selectedIndex]?.text;
            if (!selectedYearText || selectedYearText === '----------') {
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: "Veuillez sélectionner une année dans le premier modal.",
                    confirmButtonText: 'OK',
                    timer: 6000
                });
                return;
            }

            const nextYear = getNextYear(selectedYearText);

            try {
                const response = await fetch("/get_all_years/");
                if (!response.ok) throw new Error("Erreur réseau ou serveur");
                const years = await response.json();
                const modalAnnee2 = document.getElementById('modalAnneeAdvance2');
                modalAnnee2.innerHTML = '<option value="">----------</option>';

                let yearFound = false;
                if (Array.isArray(years) && years.length > 0) {
                    years.filter(item => item.annee !== selectedYearText).forEach((item) => {
                        const option = document.createElement("option");
                        option.value = item.id_annee;
                        option.textContent = item.annee;
                        if (item.annee === nextYear) {
                            option.selected = true;
                            yearFound = true;
                            modalAnnee2.disabled = true; 
                        }
                        modalAnnee2.appendChild(option);
                    });
                    showField(modalAnnee2);
                    if (yearFound) {
                        const selectedYearId = modalAnnee2.value;
                        sessionStorage.setItem('selectedAnnee2', selectedYearId);
                        const campusId = sessionStorage.getItem('selectedCampus1') || '';
                        const cycleId = sessionStorage.getItem('selectedCycle1') || '';
                        const classeId = sessionStorage.getItem('selectedClasseId1') || '';
                        const anneeId1 = sessionStorage.getItem('selectedAnnee1') || '';
                        if (campusId && cycleId && classeId && anneeId1) {
                            await updateClassesForSecondModal(selectedYearId, anneeId1, campusId, cycleId, classeId);
                        } else {
                            document.getElementById('modalClasseAdvance2').innerHTML = '<option value="">----------</option>';
                            Swal.fire({
                                icon: 'error',
                                title: 'Erreur',
                                text: 'Paramètres manquants pour charger les classes du deuxième modal.',
                                confirmButtonText: 'OK',
                                timer: 6000
                            });
                        }
                    } else {
                        document.getElementById('modalClasseAdvance2').innerHTML = '<option value="">----------</option>';
                        Swal.fire({
                            icon: 'warning',
                            title: 'Avertissement',
                            text: `L'année suivante (${nextYear}) n'est pas disponible.`,
                            confirmButtonText: 'OK',
                            timer: 6000
                        });
                    }
                } else {
                    console.log("Aucune année trouvée pour le deuxième modal");
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur',
                        text: 'Aucune année disponible pour le deuxième modal.',
                        confirmButtonText: 'OK',
                        timer: 6000
                    });
                }
            } catch (error) {
                console.error("Erreur lors du chargement des années :", error);
                Swal.fire({
                    icon: 'error',
                    title: 'Erreur',
                    text: `Erreur lors du chargement des années : ${error.message}`,
                    confirmButtonText: 'OK',
                    timer: 6000
                });
            }
        }
    });


    const updateClassesForSecondModal = async (anneeId2, anneeId1, campusId, cycleId, classeId) => {
        const url = `/get_classes_for_user/?id_annee_1=${anneeId1}&id_annee_2=${anneeId2}&id_campus=${campusId}&cycle_id=${cycleId}&id_classe=${classeId}`;
        await updateDropdownAdvanceClass(
            url,
            document.getElementById('modalClasseAdvance2'),
            "id_classe",
            "classe_id__classe"
        );
    };

    document.getElementById('modalAnneeAdvance2').addEventListener('change', async function() {
        const campusId = sessionStorage.getItem('selectedCampus1') || '';
        const cycleId = sessionStorage.getItem('selectedCycle1') || '';
        const classeId = sessionStorage.getItem('selectedClasseId1') || '';
        const anneeId1 = sessionStorage.getItem('selectedAnnee1') || '';
        if (campusId && cycleId && classeId && anneeId1) {
            await updateClassesForSecondModal(this.value, anneeId1, campusId, cycleId, classeId);
        } else {
            
            document.getElementById('modalClasseAdvance2').innerHTML = '<option value="">----------</option>';
        }
        sessionStorage.setItem('selectedAnnee2', this.value);
    });

    document.getElementById('modalClasseAdvance2').addEventListener('change', function() {
        sessionStorage.setItem('selectedClasse2', this.value);
        const selectedOption = this.options[this.selectedIndex];
        
        if (selectedOption.dataset.campus) {
            sessionStorage.setItem('selectedCampus2', selectedOption.dataset.campus);
        }
        if (selectedOption.dataset.cycle) {
            sessionStorage.setItem('selectedCycle2', selectedOption.dataset.cycle);
        }
        if (selectedOption.dataset.classe) {
            sessionStorage.setItem('selectedClasseId2', selectedOption.dataset.classe);
        }
    });

    document.getElementById('formAdvanceClass2').addEventListener('submit', (e) => {
    e.preventDefault();

    const selections = {
        annee1: sessionStorage.getItem('selectedAnnee1'),
        classe1: sessionStorage.getItem('selectedClasse1'),
        campus1: sessionStorage.getItem('selectedCampus1'),
        cycle1: sessionStorage.getItem('selectedCycle1'),
        classeId1: sessionStorage.getItem('selectedClasseId1'),
        annee2: sessionStorage.getItem('selectedAnnee2'),
        classe2: sessionStorage.getItem('selectedClasse2'),
        campus2: sessionStorage.getItem('selectedCampus2'),
        cycle2: sessionStorage.getItem('selectedCycle2'),
        classeId2: sessionStorage.getItem('selectedClasseId2')
    };

    fetch(`/avancement_next_class/?annee1=${selections.annee1}&classeId1=${selections.classeId1}&campus1=${selections.campus1}&cycle1=${selections.cycle1}&annee2=${selections.annee2}&classeId2=${selections.classe2}&campus2=${selections.campus2}&cycle2=${selections.cycle2}`, {
        method: 'GET',
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error(`Erreur HTTP : ${response.status}`);
        }
        return response.json();
    })
    .then(data => {

        document.getElementById('modalAdvanceClass1').classList.remove('active');
        document.getElementById('modalAdvanceClass2').classList.remove('active');

        sessionStorage.removeItem('selectedAnnee1');
        sessionStorage.removeItem('selectedClasse1');
        sessionStorage.removeItem('selectedCampus1');
        sessionStorage.removeItem('selectedCycle1');
        sessionStorage.removeItem('selectedClasseId1');
        sessionStorage.removeItem('selectedAnnee2');
        sessionStorage.removeItem('selectedClasse2');
        sessionStorage.removeItem('selectedCampus2');
        sessionStorage.removeItem('selectedCycle2');
        sessionStorage.removeItem('selectedClasseId2');

        if (data.error) {
            console.warn('Erreur:', data.error);
            Swal.fire({
                icon: 'error',
                title: 'Erreur',
                text: data.error,
                confirmButtonText: 'OK',
                timer: 6000
            });
        } else if (data.data && data.data.length > 0) {
            Swal.fire({
                icon: 'success',
                title: 'Succès',
                text: data.message || `${data.data.length} élève(s) traité(s) avec succès pour avancement/redoublement.`,
                confirmButtonText: 'OK',
                timer: 6000
            });
        } else {
            console.warn('Aucun élève trouvé');
            Swal.fire({
                icon: 'info',
                title: 'Information',
                text: 'Aucun élève trouvé pour cette classe.',
                confirmButtonText: 'OK',
                timer: 6000
            });
        }
    })
    .catch(error => {
        console.error('Erreur lors de l\'appel AJAX:', error);
        Swal.fire({
            icon: 'error',
            title: 'Erreur',
            text: `Une erreur est survenue lors du traitement : ${error.message}`,
            confirmButtonText: 'OK',
            timer: 6000
        });
    });
});

  
    document.querySelectorAll('.close-advance-class').forEach(closeBtn => {
        closeBtn.addEventListener('click', () => {
            const modal = closeBtn.closest('.modal-advance-class');
            modal.classList.remove('active');
            if (modal.id === 'modalAdvanceClass2') {
                document.getElementById('modalAdvanceClass1').classList.add('active');
            }
        });
    });

    window.addEventListener('click', (e) => {
        if (e.target.classList.contains('modal-advance-class')) {
            e.target.classList.remove('active');
            if (e.target.id === 'modalAdvanceClass2') {
                document.getElementById('modalAdvanceClass1').classList.add('active');
            }
        }
    });


</script>
