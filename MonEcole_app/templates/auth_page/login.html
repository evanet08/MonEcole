<!DOCTYPE html>
<html lang="fr">
{% load static %}

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonEcole - Connexion</title>
    <link href="{% static 'assets/img/MonEcoleApp-logo.png' %}" rel="icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        body,
        html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Auth container */
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 184, 148, 0.1), 0 8px 25px rgba(0, 0, 0, 0.06);
            overflow: hidden;
            display: flex;
            max-width: 960px;
            width: 95%;
            animation: fadeIn 0.8s ease-out;
            border: 1px solid rgba(0, 184, 148, 0.08);
        }

        /* Left section — green gradient with logo */
        .auth-left {
            flex: 1;
            background: linear-gradient(135deg, #00b894, #00cec9);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .auth-left::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.08) 0%, transparent 60%);
            animation: epFloat 20s infinite ease-in-out alternate;
        }

        @keyframes epFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(-30px, 20px) rotate(10deg);
            }
        }

        .auth-left h2 {
            font-size: 1.8rem;
            margin-bottom: 0.75rem;
            font-weight: 700;
            color: white !important;
        }

        .auth-left p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .auth-left img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
        }

        /* Right section — form */
        .auth-right {
            flex: 1;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .auth-right h2,
        .auth-right h4 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #1a1a2e !important;
            font-weight: 700 !important;
        }

        .auth-right p {
            color: #636e72;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        /* Form */
        .auth-form {
            display: flex;
            flex-direction: column;
        }

        .auth-form input {
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            border: 1.5px solid #dfe6e9;
            border-radius: 12px;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .auth-form input:focus {
            border-color: #00b894;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.1);
            background: white;
        }

        .auth-form input::placeholder {
            color: #b2bec3;
            font-weight: 400;
        }

        .auth-form button {
            padding: 0.85rem;
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.25);
            letter-spacing: 0.3px;
        }

        .auth-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.3);
        }

        /* Auth switch link */
        .auth-switch {
            text-align: center;
            margin-top: 1.25rem;
        }

        .auth-switch a {
            color: #00b894;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-switch a:hover {
            color: #009d7e;
        }

        .auth-switch p {
            color: #636e72;
            font-size: 0.88rem;
        }

        /* Fade in */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 518px) {
            .auth-container {
                flex-direction: column;
                max-width: 100%;
                margin: 1rem;
                border-radius: 16px;
            }

            .auth-left {
                padding: 1.5rem;
            }

            .auth-right {
                padding: 1.5rem;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(6px);
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 2rem;
            width: 90%;
            max-width: 480px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(0, 184, 148, 0.08);
        }

        .modal-content::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00b894, #00cec9);
            border-radius: 20px 20px 0 0;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-30px) scale(0.95);
                opacity: 0;
            }

            to {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
        }

        .close {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            font-size: 1.8rem;
            cursor: pointer;
            color: #b2bec3;
            transition: color 0.3s ease;
        }

        .close:hover {
            color: #1a1a2e;
        }

        .modal-content h3 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 1.5rem;
            text-align: center;
            padding-bottom: 0.75rem;
            position: relative;
        }

        .modal-content h3::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 3px;
            background: linear-gradient(to right, #00b894, #00cec9);
            border-radius: 3px;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #usernameInput {
            width: 100%;
            max-width: 300px;
            padding: 0.85rem 1rem;
            margin: 1rem 0;
            border: 1.5px solid #dfe6e9;
            border-radius: 12px;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            font-weight: 500;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        #usernameInput:focus {
            border-color: #00b894;
            outline: none;
            box-shadow: 0 0 0 4px rgba(0, 184, 148, 0.1);
            background: white;
        }

        #checkUsername {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.75rem;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.25);
        }

        #checkUsername:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.3);
        }

        #usernameResult {
            font-size: 0.92rem;
            margin-top: 1.25rem;
            color: #1a1a2e;
            font-weight: 500;
            text-align: center;
        }

        /* Messages */
        #message-container {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1000;
        }

        .message-box {
            background: linear-gradient(135deg, #00b894, #009d7e);
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.2);
            opacity: 0;
            transform: translateY(-40px) scale(0.9);
            transition: opacity 0.6s ease-out, transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .falling {
            opacity: 1 !important;
            transform: translateY(0) scale(1);
        }

        .message-box .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .disappear {
            animation: fade-out 3s ease forwards;
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }
        }

        /* Logo */
        .logo-container {
            margin-bottom: 2rem;
            display: flex;
            justify-content: center;
        }

        #logo_app {
            display: inline-flex;
            align-items: center;
            padding: 18px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .initials-container {
            position: relative;
            margin-right: 14px;
        }

        .initials {
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            background: white;
            color: #00b894;
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            z-index: 2;
            position: relative;
        }

        .graduation-hat {
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 20px;
            background: linear-gradient(to bottom, white, #dfe6e9);
            border-radius: 50% 50% 0 0;
            z-index: 3;
        }

        .graduation-hat:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 32px;
            height: 8px;
            background: linear-gradient(to bottom, #00b894, #009d7e);
            border-radius: 2px;
        }

        .hat-tassel {
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 15px;
            background: #fdcb6e;
            border-radius: 2px;
            z-index: 4;
        }

        .hat-tassel:before {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 8px;
            height: 8px;
            background: #fdcb6e;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(253, 203, 110, 0.5);
        }

        /* Responsive logo */
        @media (max-width: 900px) {
            #logo_app {
                font-size: 1.5rem;
                padding: 14px 22px;
            }

            .initials {
                width: 42px;
                height: 42px;
                font-size: 1rem;
            }

            .graduation-hat {
                top: -20px;
                width: 28px;
                height: 18px;
            }

            .graduation-hat:after {
                width: 28px;
                bottom: -7px;
                height: 7px;
            }
        }

        @media (max-width: 480px) {
            #logo_app {
                font-size: 1.3rem;
                padding: 12px 18px;
            }

            .initials {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }

            .graduation-hat {
                top: -18px;
                width: 25px;
                height: 16px;
            }

            .graduation-hat:after {
                width: 25px;
                bottom: -6px;
                height: 6px;
            }

            .hat-tassel {
                height: 12px;
                bottom: -12px;
            }

            .hat-tassel:before {
                width: 6px;
                height: 6px;
            }
        }
    </style>
</head>

<body class="ep-premium">

    <div class="ep-bg-animation">
        <div class="ep-bg-shape ep-bg-shape-1"></div>
        <div class="ep-bg-shape ep-bg-shape-2"></div>
    </div>
    {% if messages %}
    <div id="message-container" class="container">
        <div class="message-box">
            <br>
            {% for message in messages %}
            <div class="alert {{ message.tags }} alert-dismissible" role="alert">
                {{ message|safe }}
            </div>
            {% endfor %}
        </div>
    </div>
    {% endif %}
    <div class="auth-container">

        <!-- Section gauche (illustration) -->
        {% include 'partials/title_logo.html' %}

        <!-- Section droite (formulaire) -->

        <div class="auth-right">

            <center>
                <h4>Connexion</h4>
            </center>

            <form class="auth-form" action="{% url 'log_in' %}" method="POST">
                {% csrf_token %}
                <input name="email" type="email" placeholder="Adresse e-mail" required>
                <input name="password" type="password" placeholder="Mot de passe" required>
                <button type="submit">Se connecter</button>
            </form>
            <div class="auth-switch">
                <p>Pas encore de compte ? <a href="#" id="openModal">S'inscrire</a></p>
            </div>
        </div>

        <!-- Fenêtre modale -->
        <div id="signupModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <form method="POST" action="{% url 'check_username' %}">
                    {% csrf_token %}
                    <h3>Vérification de l'utilisateur</h3>
                    <input name="username" type="text" id="usernameInput" placeholder="Entrez votre nom d_utilisateur"
                        required>
                    <button type="submit" id="checkUsername"> <i class="fas fa-search"></i> Vérifier</button>
                    <p id="usernameResult"></p>
                </form>
            </div>

        </div>

    </div>
    <script>
        document.getElementById("openModal").addEventListener("click", function () {
            document.getElementById("signupModal").style.display = "block";
        });

        document.querySelector(".close").addEventListener("click", function () {
            document.getElementById("signupModal").style.display = "none";
        });

        window.onclick = function (event) {
            let modal = document.getElementById("signupModal");
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };

        document.getElementById("checkUsername").addEventListener("click", function () {
            let username = document.getElementById("usernameInput").value;
            let resultElement = document.getElementById("usernameResult");

            if (username.trim() === "") {
                resultElement.innerHTML = "Veuillez entrer un username.";
                resultElement.style.color = "red";
                return;
            }




        });

    </script>
    <script>
        window.onload = function () {
            setTimeout(() => {
                document.querySelectorAll('.message-box').forEach((box) => {
                    box.classList.add('falling');
                });
            }, 700);

            // Gestion du bouton de fermeture
            document.querySelectorAll('.close-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    let box = this.parentElement;
                    box.classList.add('disappear');
                    setTimeout(() => { box.remove(); }, 1000);
                });
            });

            // Disparition automatique après 5 secondes avec animation
            setTimeout(() => {
                document.querySelectorAll('.message-box').forEach(box => {
                    box.classList.add('disappear');
                    setTimeout(() => box.remove(), 1000);
                });
            }, 8000);
        };

    </script>



</body>

</html>
