{% extends "base.html" %}

{% block title %}Configuration requise{% endblock %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: center; flex: 1; padding: 2rem;">
    <div style="background: white; border-radius: 20px; padding: 3rem; text-align: center; max-width: 500px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);">
        <div style="width: 80px; height: 80px; border-radius: 20px; background: linear-gradient(135deg, #f59e0b, #d97706); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <i class="fas fa-exclamation-triangle" style="font-size: 2rem; color: white;"></i>
        </div>
        <h3 style="font-weight: 700; color: #1e293b; margin-bottom: 0.5rem;">Configuration requise</h3>
        <p style="color: #64748b; margin-bottom: 1.5rem;">
            Aucun établissement n'est associé à votre domaine. 
            Veuillez contacter l'administrateur pour configurer votre espace.
        </p>
        <a href="/login/" style="display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 12px; text-decoration: none; font-weight: 600; transition: all 0.2s;">
            <i class="fas fa-arrow-left"></i> Retour au login
        </a>
    </div>
</div>
{% endblock %}
