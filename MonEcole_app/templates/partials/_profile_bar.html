{% load static %}

<div class="navbar" style="display:flex !important; align-items:center !important; justify-content:space-between !important; height:auto !important; min-height:60px; border-bottom:1px solid rgba(0,184,148,0.08) !important; overflow:visible !important; border-top:none !important; border-left:none !important; border-right:none !important;">
  {% if personnel_list or cours_attribution or modules_user_list or inscriptions or classe_active_list or classes_cycle_actif or form_crs_cycle or emprunt_list_retour %}
  <div class="search">
    <i class="fas fa-search"></i>
    <input id="searchInput" type="text" placeholder="Rechercher...">
  </div>
  {% endif %}
  <div class="user-profile" style="display:flex !important; visibility:visible !important; opacity:1 !important; align-items:center !important; gap:12px; padding:0.5rem 1rem; background:#f0f2f5 !important; border-radius:50px; cursor:pointer; margin-left:auto; flex-shrink:0; z-index:100; position:relative;">
    {% if photo_profil %}
    <img src="{{ photo_profil }}" alt="Photo" style="width:42px !important; height:42px !important; border-radius:50% !important; object-fit:cover; border:3px solid #00b894 !important; display:block !important; visibility:visible !important; flex-shrink:0;">
    {% else %}
    <div style="width:40px; height:40px; background:linear-gradient(135deg,#00b894,#00cec9); border-radius:50%; display:flex !important; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.1rem; flex-shrink:0; text-transform:uppercase;">{{ last_name|first }}</div>
    {% endif %}
    <div>
      <h3 style="font-size:0.92rem !important; font-weight:600 !important; color:#1a1a2e !important; font-family:Inter,sans-serif !important; margin:0 !important; padding:0 !important; white-space:nowrap; border:none !important; text-align:left !important; display:block !important; background:none !important;">{{ last_name }}</h3>
    </div>
  </div>
</div>
