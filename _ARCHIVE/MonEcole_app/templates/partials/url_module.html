

<ul>
    {% for module in modules %}
    {% if module.url_name %}
    <div class="menu-item">
        <a class="dropdown-item" href="{% url module.url_name %}">
            <span class="emoji-icon">📌</span> {{ module.module }}
        </a>
    </div>
    {% else %}
    <li class="text-muted">{{ module.module }} (Pas de lien disponible)</li>
    {% endif %}
    {% endfor %}
</ul>
