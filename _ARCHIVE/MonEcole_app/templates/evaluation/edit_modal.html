



    <div class="modal fade" id="editMentionModal" tabindex="-1" aria-labelledby="editMentionModalLabel" aria-hidden="true">

        <div class="modal-dialog">

            <div class="modal-content">

                <div class="modal-header">

                    <h5 class="modal-title" id="editMentionModalLabel">Modifier la Mention</h5>

                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

                </div>

                <div class="modal-body">

                    <form id="edit_mention_form" method="POST" action="{% url 'mention_edit' %}">

                        {% csrf_token %}

                        <input type="hidden" id="mention_id" name="id_mention">

                        <div class="mb-3">

                            <label for="mention" class="form-label">Mention</label>

                            <input type="text" class="form-control" id="mention" name="mention" required>

                        </div>

                        <div class="mb-3">

                            <label for="abbreviation" class="form-label">Abréviation</label>

                            <input type="text" class="form-control" id="abbreviation" name="abbreviation" required>

                        </div>

                        <div class="mb-3">

                            <label for="min" class="form-label">Min</label>

                            <input type="number" step="0.01" class="form-control" id="min" name="min" required>

                        </div>

                        <div class="mb-3">

                            <label for="max" class="form-label">Max</label>

                            <input type="number" step="0.01" class="form-control" id="max" name="max" required>

                        </div>

                        <div class="modal-footer">

                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>

                            <button type="submit" class="btn btn-primary">Enregistrer</button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
